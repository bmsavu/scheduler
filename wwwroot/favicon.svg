<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Calendar body -->
  <rect x="4" y="12" width="56" height="48" rx="6" fill="#fff" stroke="#0d6efd" stroke-width="3"/>
  <!-- Top bar -->
  <rect x="4" y="12" width="56" height="16" rx="6" fill="#0d6efd"/>
  <rect x="4" y="22" width="56" height="6" fill="#0d6efd"/>
  <!-- Rings -->
  <rect x="18" y="6" width="4" height="14" rx="2" fill="#333"/>
  <rect x="42" y="6" width="4" height="14" rx="2" fill="#333"/>
  <!-- Day number -->
  <text x="32" y="50" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" fill="#0d6efd">31</text>
</svg>
